name = "memorynode-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
tsconfig = "tsconfig.json"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[dev]
port = 8787

[durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[env.staging]
name = "memorynode-api-staging"
[env.staging.durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" }
]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[env.production]
name = "memorynode-api"
[env.production.durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" }
]

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[env.production.vars]
EMBEDDINGS_MODE = "openai"
ENVIRONMENT = "production"
RATE_LIMIT_MODE = "on"
